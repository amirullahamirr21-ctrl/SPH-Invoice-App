      ...appDb.sheets.products.filter(x => x.is_active !== false).map(mapProductLegacy),
      ...appDb.sheets.doc_headers.filter(x => x.status !== 'deleted').map(mapHeaderLegacy),
      ...settingsRows
    ];
    currentRecordCount = appDb.sheets.customers.length + appDb.sheets.products.length + appDb.sheets.doc_headers.length + settingsRows.length;
  }

  function ensureDb(){
    if (appDb) return;
    const stored = loadDbFromStorage();
    if (stored) appDb = stored;
    else if (Array.isArray(allData) && allData.length) appDb = migrateLegacyFlatData(allData);
    else appDb = defaultDb();
    const fallbackUrl = getStartupUrlOverride() || EMBEDDED_WEB_APP_URL || localStorage.getItem('sph_invoice_online_url') || '';
    if (fallbackUrl && !appDb.settings.api_web_app_url) appDb.settings.api_web_app_url = String(fallbackUrl).trim();
    syncCompanySettings();
    rebuildLegacyView();
  }

  function getSheet(type){ ensureDb(); return appDb.sheets[type]; }

  function getNextAvailableRunningNumber(docType, docDate, excludeId){
    ensureDb();
    const normalizedType = docType === 'SPH' || docType === 'sph' ? 'sph' : 'invoice';
    const dt = new Date(docDate || new Date().toISOString());
    const safeDt = Number.isNaN(dt.getTime()) ? new Date() : dt;
    const year = safeDt.getFullYear();
    const used = new Set(
      appDb.sheets.doc_headers
        .filter(h => h.status !== 'deleted' && h.doc_type === normalizedType && h.id !== excludeId)
        .filter(h => {
          const hd = new Date(h.doc_date || h.created_at || new Date().toISOString());
          const hYear = Number.isNaN(hd.getTime()) ? year : hd.getFullYear();
          return hYear === year;
        })
        .map(h => extractRunningNumber(h.doc_number))
        .filter(Boolean)
    );
    let next = 1;
    while (used.has(next)) next++;
    return next;
  }

  function peekNextDocumentNumber(type, docDate, excludeId){
    ensureDb();
    const docType = type === 'SPH' || type === 'sph' ? 'sph' : 'invoice';
    const next = getNextAvailableRunningNumber(docType, docDate, excludeId);
    return formatDocumentNumber(docType, next, docDate, 'SSG');
  }

  function reserveDocumentNumber(docType, docNumber, docDate){
    ensureDb();
    const dt = new Date(docDate || new Date().toISOString());
    const year = Number.isNaN(dt.getTime()) ? new Date().getFullYear() : dt.getFullYear();
    let seq = appDb.sheets.doc_sequences.find(x => x.doc_type === docType && x.year === year);
    if (!seq) {
      seq = { id: uid('seq'), doc_type: docType, year, last_number: 0, updated_at: new Date().toISOString() };
      appDb.sheets.doc_sequences.push(seq);
    }
    const running = extractRunningNumber(docNumber);
    if (running > seq.last_number) seq.last_number = running;
    seq.updated_at = new Date().toISOString();
  }

  function documentExists(docType, docNumber, excludeId){
    ensureDb();
    return appDb.sheets.doc_headers.some(h => h.doc_type === docType && h.doc_number === docNumber && h.id !== excludeId && h.status !== 'deleted');
  }

  function calculateDocumentTotals(items, state){
    ensureDb();
    const sanitizedItems = (items || []).map(item => ({
      qty: Math.max(0, toNumber(item.qty)),
      price: Math.max(0, toNumber(item.price)),
      name: item.name || '',
      uom: item.uom || '',
      description: item.description || ''
    }));
    const subtotal = Math.round(sanitizedItems.reduce((sum, item) => sum + (item.qty * item.price), 0));
    const discount = Math.round(Math.max(0, toNumber(state.discount || 0)));
    const shipping = Math.round(Math.max(0, toNumber(state.shipping_cost || 0)));
    const taxableBase = Math.max(0, subtotal - discount + shipping);
    const ppnEnabled = !!companySettings.ppn_enabled && !!state.ppn_active;
    const ppnAmount = ppnEnabled ? Math.round(taxableBase * (toNumber(companySettings.ppn_rate) / 100)) : 0;
    const pphAmount = !!companySettings.pph_enabled ? Math.round(Math.max(0, toNumber(state.tax_pph || 0))) : 0;
    const grandTotal = taxableBase + ppnAmount - pphAmount;
    return { subtotal, discount, shipping, taxableBase, ppnAmount, pphAmount, grandTotal };
  }

  function upsertCustomer(entity){
    ensureDb();
    const list = appDb.sheets.customers;
    const now = new Date().toISOString();
    if (entity.id) {
      const idx = list.findIndex(x => x.id === entity.id);
      if (idx >= 0) list[idx] = { ...list[idx], ...entity, updated_at: now, is_active: true };
      else list.push({ ...entity, created_at: now, updated_at: now, is_active: true });
    } else {
      list.push({ ...entity, id: uid('cust'), created_at: now, updated_at: now, is_active: true });
    }
    saveDb(false);
  }

    if (entity.id) {
      const idx = list.findIndex(x => x.id === entity.id);
      if (idx >= 0) list[idx] = { ...list[idx], ...entity, updated_at: now, is_active: true };
      else list.push({ ...entity, created_at: now, updated_at: now, is_active: true });
    } else {
      list.push({ ...entity, id: uid('prod'), created_at: now, updated_at: now, is_active: true });

  function upsertDocument(payload){
    ensureDb();
    const now = new Date().toISOString();
    const headerList = appDb.sheets.doc_headers;
    const itemList = appDb.sheets.doc_items;
    const idx = payload.id ? headerList.findIndex(x => x.id === payload.id) : -1;
    const id = idx >= 0 ? headerList[idx].id : uid('doc');
    const header = { ...payload, id, updated_at: now };
    if (idx >= 0) headerList[idx] = { ...headerList[idx], ...header };
    else headerList.push({ ...header, created_at: now, updated_at: now });
    for (let i = itemList.length - 1; i >= 0; i--) {
      if (itemList[i].doc_id === id) itemList.splice(i, 1);
    }
    (payload.items || []).forEach((item, idxItem) => {
      itemList.push({
        id: uid('item'),
        doc_id: id,
        seq_no: idxItem + 1,
        product_id: item.product_id || '',
        item_name: item.name || '',
        description: item.description || '',
        qty: Math.max(0, toNumber(item.qty)),
        uom: item.uom || '',
        unit_price: Math.round(Math.max(0, toNumber(item.price))),
        line_total: Math.round(Math.max(0, toNumber(item.qty)) * Math.max(0, toNumber(item.price)))
      });
    });
    reserveDocumentNumber(header.doc_type, header.doc_number, header.doc_date);
    saveDb(false);
    return id;
  }

  function removeEntity(id){
    ensureDb();
    const now = new Date().toISOString();
    const customer = appDb.sheets.customers.find(x => x.id === id);
    if (customer) {
      customer.is_active = false;
      customer.updated_at = now;
      saveDb(false);
      return true;
    }
    const product = appDb.sheets.products.find(x => x.id === id);
    if (product) {
      product.is_active = false;
      product.updated_at = now;
      saveDb(false);
      return true;
    }
    const header = appDb.sheets.doc_headers.find(x => x.id === id);
    if (header) {
      header.status = 'deleted';
      header.updated_at = now;
      saveDb(false);
      return true;
    }
    return false;
  }

  dataHandler.onDataChanged = function(data){
    const stored = loadDbFromStorage();
    if (stored && stored.sheets && (stored.sheets.customers.length || stored.sheets.products.length || stored.sheets.doc_headers.length)) {
      appDb = stored;
    } else if (Array.isArray(data) && data.length) {
      appDb = migrateLegacyFlatData(data);
    } else {
      appDb = stored || defaultDb();
    }
    syncCompanySettings();
    saveDb();
  };

  window.generateDocNumber = function(type){
    const dateInput = document.getElementById('docDate')?.value || new Date().toISOString().split('T')[0];
    return peekNextDocumentNumber(type, dateInput, editingRecord?.__backendId);
  };

  window.getByCategory = function(cat){ ensureDb(); return allData.filter(d => d.data_category === cat); };
  window.getCustomers = function(){ ensureDb(); return appDb.sheets.customers.filter(x => x.is_active !== false).map(mapCustomerLegacy); };
  window.getProducts = function(){ ensureDb(); return appDb.sheets.products.filter(x => x.is_active !== false).map(mapProductLegacy); };
  window.getSPHs = function(){ ensureDb(); return appDb.sheets.doc_headers.filter(x => x.status !== 'deleted' && x.doc_type === 'sph').map(mapHeaderLegacy); };
  window.getInvoices = function(){ ensureDb(); return appDb.sheets.doc_headers.filter(x => x.status !== 'deleted' && x.doc_type === 'invoice').map(mapHeaderLegacy); };
  window.getSettings = function(){ ensureDb(); return Object.keys(appDb.settings).map(key => ({ __backendId: 'setting_' + key, data_category: 'setting', setting_key: key, setting_value: appDb.settings[key] })); };
  window.getDocuments = function(){ return [...window.getSPHs(), ...window.getInvoices()]; };

  window.renderDocTotals = function(){
    const totals = calculateDocumentTotals(docFormItems, docFormState);
    let html = `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">Subtotal</span><span class="font-medium">${formatCurrency(totals.subtotal)}</span></div>`;
    if (companySettings.discount_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">Diskon</span><span class="font-medium">-${formatCurrency(totals.discount)}</span></div>`;
    if (companySettings.shipping_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">Biaya Tambahan</span><span class="font-medium">+${formatCurrency(totals.shipping)}</span></div>`;
    if (companySettings.ppn_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">PPN ${companySettings.ppn_rate}%</span><span class="font-medium">${docFormState.ppn_active ? formatCurrency(totals.ppnAmount) : '0'}</span></div>`;
    if (companySettings.pph_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">PPH ${companySettings.pph_rate}%</span><span class="font-medium">-${formatCurrency(totals.pphAmount)}</span></div>`;
    html += `<div class="border-t border-surface-200 my-2"></div><div class="flex justify-between text-sm"><span class="font-semibold text-surface-800">Grand Total</span><span class="font-bold text-brand-600">${formatCurrency(totals.grandTotal)}</span></div><div class="text-[10px] text-surface-400 mt-1 italic">${terbilang(totals.grandTotal)}</div>`;
    return html;
  };

  window.updateDocItem = function(idx, field, val){
    if (field === 'qty') docFormItems[idx].qty = Math.max(0, toNumber(val));
    else if (field === 'price') docFormItems[idx].price = Math.max(0, toNumber(val));
    else docFormItems[idx][field] = val;
    document.getElementById('docTotals').innerHTML = renderDocTotals();
  };

  window.updateDocForm = function(){
    docFormState.ppn_active = document.getElementById('ppnCheck')?.checked ?? docFormState.ppn_active;
    docFormState.discount = Math.max(0, toNumber(document.getElementById('discountInput')?.value || 0));
    docFormState.shipping_cost = Math.max(0, toNumber(document.getElementById('shippingInput')?.value || 0));
    docFormState.tax_pph = Math.max(0, toNumber(document.getElementById('pphInput')?.value || 0));
    document.getElementById('docTotals').innerHTML = renderDocTotals();
  };

  window.saveDocument = async function(){
    ensureDb();
    const btn = document.getElementById('saveDocBtn');
    const custSel = document.getElementById('docCustomer');
    const cust = getCustomers().find(x => x.__backendId === custSel.value);
    if (!custSel.value || !cust) { showToast('Pilih customer terlebih dahulu', 'error'); return; }
    if (!docFormItems.some(i => i.name && String(i.name).trim())) { showToast('Tambahkan minimal 1 item dengan nama', 'error'); return; }
    const docDate = document.getElementById('docDate').value || new Date().toISOString().split('T')[0];
    const docType = docFormType === 'SPH' ? 'sph' : 'invoice';
    let docNumber = (document.getElementById('docNum').value || '').trim();
    if (!docNumber || documentExists(docType, docNumber, editingRecord?.__backendId)) {
      docNumber = peekNextDocumentNumber(docFormType, docDate);
    }
    btn.disabled = true;
    btn.textContent = editingRecord ? 'Mengupdate...' : 'Menyimpan...';
    const totals = calculateDocumentTotals(docFormItems, docFormState);
    const id = upsertDocument({
      id: editingRecord?.__backendId,
      doc_type: docType,
      doc_number: docNumber,
      doc_date: safeDate(docDate),
      customer_id: cust.__backendId,
      customer_name: cust.customer_name || '', customer_company: cust.customer_company || '', customer_address: cust.customer_address || '', customer_city: cust.customer_city || '', customer_phone: cust.customer_phone || '', customer_email: cust.customer_email || '',
      subtotal: totals.subtotal,
      discount_amount: totals.discount,
      shipping_amount: totals.shipping,
      taxable_base: totals.taxableBase,
      ppn_enabled: !!docFormState.ppn_active,
      ppn_rate: toNumber(companySettings.ppn_rate),
      ppn_amount: totals.ppnAmount,
      pph_enabled: !!companySettings.pph_enabled,
      pph_rate: toNumber(companySettings.pph_rate),
      pph_amount: totals.pphAmount,
      grand_total: totals.grandTotal,
      notes: docType === 'sph' ? companySettings.sph_notes : companySettings.invoice_notes,
      terms: docType === 'sph' ? companySettings.sph_terms : companySettings.invoice_terms,
      terbilang: terbilang(totals.grandTotal),
      status: 'active',
      source_doc_id: editingRecord?.source_doc || '',
      items: docFormItems
    });
    saveDb();
    btn.disabled = false;
    btn.textContent = editingRecord ? 'Update' : 'Simpan';
    showToast(`${docFormType} berhasil ${editingRecord ? 'diupdate' : 'disimpan'}!`);
    closeModal();
    docFormItems = [];
    editingRecord = null;
    docFormState = { ppn_active: true, discount: 0, shipping_cost: 0, tax_pph: 0 };
    return id;
  };

  window.convertToInvoice = async function(id){
    ensureDb();
    const source = getSPHs().find(d => d.__backendId === id);
    if (!source) return;
    const items = parseJson(source.items_json || '[]', []);
    const invoiceDate = new Date().toISOString().split('T')[0];
    const invoiceNumber = peekNextDocumentNumber('Invoice', invoiceDate);
    upsertDocument({
      doc_type: 'invoice',
      doc_number: invoiceNumber,
      doc_date: invoiceDate,
      customer_id: source.customer_id || '',
      customer_name: source.customer_name || '', customer_company: source.customer_company || '', customer_address: source.customer_address || '', customer_city: source.customer_city || '', customer_phone: source.customer_phone || '', customer_email: source.customer_email || '',
      subtotal: Math.round(toNumber(source.subtotal)),
      discount_amount: Math.round(toNumber(source.discount)),
      shipping_amount: Math.round(toNumber(source.shipping_cost)),
      taxable_base: Math.round(toNumber(source.subtotal) - toNumber(source.discount) + toNumber(source.shipping_cost)),
      ppn_enabled: toBool(source.ppn_active),
      ppn_rate: toNumber(source.ppn_rate, companySettings.ppn_rate),
      ppn_amount: Math.round(toNumber(source.ppn)),
      pph_enabled: toNumber(source.tax_pph) > 0,
      pph_rate: toNumber(source.pph_rate, companySettings.pph_rate),
      pph_amount: Math.round(toNumber(source.tax_pph)),
      grand_total: Math.round(toNumber(source.grand_total)),
      notes: companySettings.invoice_notes,
      terms: companySettings.invoice_terms,
      terbilang: source.terbilang || terbilang(toNumber(source.grand_total)),
      status: 'active',
      source_doc_id: source.doc_number || id,
      items
    });
    saveDb();
    showToast(`Invoice ${invoiceNumber} berhasil dibuat dari SPH!`);
  };

  window.saveCustomer = async function(){
    ensureDb();
    const name = document.getElementById('cf_name').value.trim();
    if (!name) { showToast('Nama harus diisi', 'error'); return; }
    const btn = document.getElementById('saveCustBtn');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';
    upsertCustomer({
      id: editingRecord?.__backendId,
      name,
      company: document.getElementById('cf_company').value.trim(),
      address: document.getElementById('cf_address').value.trim(),
      city: document.getElementById('cf_city').value.trim(),
      phone: document.getElementById('cf_phone').value.trim(),
      email: document.getElementById('cf_email').value.trim()
    });
    saveDb();
    btn.disabled = false;
    btn.textContent = 'Simpan';
    showToast(`Customer berhasil ${editingRecord ? 'diupdate' : 'ditambahkan'}!`);
    closeModal();
    editingRecord = null;
  };

  window.saveProduct = async function(){
    ensureDb();
    const name = document.getElementById('pf_name').value.trim();
    if (!name) { showToast('Nama produk harus diisi', 'error'); return; }
    const btn = document.getElementById('saveProdBtn');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';
    upsertProduct({
      id: editingRecord?.__backendId,
      code: document.getElementById('pf_code').value.trim(),
      name,
      uom: document.getElementById('pf_uom').value.trim(),
      price: Math.max(0, toNumber(document.getElementById('pf_price').value)),
      description: document.getElementById('pf_desc').value.trim()
    });
    saveDb();
    btn.disabled = false;
    btn.textContent = 'Simpan';
    showToast(`Produk berhasil ${editingRecord ? 'diupdate' : 'ditambahkan'}!`);
    closeModal();
    editingRecord = null;
  };

  window.deleteRecord = async function(id){
    const btn = document.getElementById('delRecBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Menghapus...'; }
    const ok = removeEntity(id);
    if (ok) {
      saveDb();
      showToast('Data berhasil dihapus');
      closeModal();
    } else {
      showToast('Data tidak ditemukan', 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Hapus'; }
    }
  };

  window.deleteDoc = async function(id){
    const btn = document.getElementById('delDocBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Menghapus...'; }
    const ok = removeEntity(id);
    if (ok) {
      saveDb();
      showToast('Dokumen berhasil dihapus');
      closeModal();
    } else {
      showToast('Dokumen tidak ditemukan', 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Hapus'; }
    }
  };

  window.processCSV = async function(type){
    ensureDb();
    const csv = document.getElementById('csvInput').value.trim();
    if (!csv) { showToast('Paste data CSV', 'error'); return; }
    const btn = document.getElementById('importBtn');
    btn.disabled = true;
    btn.textContent = 'Importing...';
    const rows = parseCsv(csv);
    if (!rows.length) {
      btn.disabled = false;
      btn.textContent = 'Import';
      showToast('CSV kosong atau tidak valid', 'error');
      return;
    }
    let count = 0;
    rows.forEach(cols => {
      const isHeader = cols[0] && /^(nama|kode)$/i.test(cols[0]);
      if (isHeader) return;
      if (type === 'customer' && (cols[0] || '').trim()) {
        upsertCustomer({ name: cols[0] || '', company: cols[1] || '', address: cols[2] || '', city: cols[3] || '', phone: cols[4] || '', email: cols[5] || '' });
        count++;
      }
      if (type === 'product' && (cols[0] || '').trim()) {
        upsertProduct({ code: cols[0] || '', name: cols[1] || '', uom: cols[2] || '', price: Math.max(0, toNumber(cols[3])), description: cols[4] || '' });
        count++;
      }
    });
    saveDb();
    btn.disabled = false;
    btn.textContent = 'Import';
    showToast(`${count} data berhasil diimport!`);
    closeModal();
  };

  window.saveSettings = async function(){
    ensureDb();
    const btn = document.getElementById('saveSettingsBtn');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';
    appDb.settings = normalizeSettings({
      ...appDb.settings,
      company_name: document.getElementById('s_company').value.trim(),
      company_description: document.getElementById('s_description').value.trim(),
      company_address: document.getElementById('s_address').value.trim(),
      company_city: document.getElementById('s_city').value.trim(),
      company_phone: document.getElementById('s_phone').value.trim(),
      company_email: document.getElementById('s_email').value.trim(),
      doc_accent: document.getElementById('s_accent').value || '#4f46e5',
      sph_format: document.getElementById('s_sphfmt').value.trim() || 'SPH-{NUM}/{ABBR}/{MM}/{YY}',
      inv_format: document.getElementById('s_invfmt').value.trim() || 'INV-{NUM}/{ABBR}/{MM}/{YY}',
      sph_notes: document.getElementById('s_sphnotes').value,
      invoice_notes: document.getElementById('s_invnotes').value,
      sph_terms: document.getElementById('s_sphterms').value,
      invoice_terms: document.getElementById('s_invterms').value,
      director_name: document.getElementById('s_dirname').value.trim(),
      director_title: document.getElementById('s_dirtitle').value.trim(),
      show_secondary_signature: document.getElementById('s_show_secondary_signature')?.checked,
      secondary_signature_label: document.getElementById('s_secondary_label')?.value || 'Menyetujui,',
      show_logo_watermark: document.getElementById('s_show_logo_watermark')?.checked,
      secondary_signature_name: document.getElementById('s_secondary_name')?.value || '',
      secondary_signature_title: document.getElementById('s_secondary_title')?.value || '',
      ppn_enabled: document.getElementById('s_ppn_enabled')?.checked,
      ppn_rate: document.getElementById('s_ppn_rate')?.value,
      discount_enabled: document.getElementById('s_discount_enabled')?.checked,
      shipping_enabled: document.getElementById('s_shipping_enabled')?.checked,
      pph_enabled: document.getElementById('s_pph_enabled')?.checked,
      pph_rate: document.getElementById('s_pph_rate')?.value,
      api_web_app_url: document.getElementById('s_api_web_app_url')?.value.trim() || '',
      api_auto_sync: document.getElementById('s_api_auto_sync')?.checked,
      api_last_sync: appDb.settings.api_last_sync || '',
      logo_data: companySettings.logo_data || appDb.settings.logo_data || '',
      signature_data: companySettings.signature_data || appDb.settings.signature_data || '',
      secondary_signature_data: companySettings.secondary_signature_data || appDb.settings.secondary_signature_data || ''
    });
    persistRemoteConfig(appDb.settings.api_web_app_url, appDb.settings.api_auto_sync);
    saveDb();
    btn.disabled = false;
    btn.textContent = 'Simpan Pengaturan';
    showToast('Pengaturan berhasil disimpan!');
  };

  window.exportTransaksiCSV = function(){
    const docs = getDocuments().sort((a,b)=>new Date(b.doc_date||b.created_at)-new Date(a.doc_date||a.created_at));
    let csv = 'No Dokumen,Tipe,Customer,Perusahaan,Tanggal,Subtotal,Diskon,Biaya Tambahan,PPN,PPH,Grand Total\n';
    docs.forEach(d => {
      csv += [
        escapeCsv(d.doc_number),
        escapeCsv(d.data_category === 'sph' ? 'SPH' : 'Invoice'),
        escapeCsv(d.customer_name),
        escapeCsv(d.customer_company),
        escapeCsv(formatDateShort(d.doc_date || d.created_at)),
        Math.round(toNumber(d.subtotal)),
        Math.round(toNumber(d.discount)),
        Math.round(toNumber(d.shipping_cost)),
        Math.round(toNumber(d.ppn)),
        Math.round(toNumber(d.tax_pph)),
        Math.round(toNumber(d.grand_total))
      ].join(',') + '\n';
    });
    downloadFile(csv, `Transaksi_${new Date().getFullYear()}.csv`, 'text/csv');
  };

  window.generateSpreadsheetMapping = function(){
    ensureDb();
    return {
      settings: Object.keys(appDb.settings).map(key => ({ sheet: 'settings', key, value: appDb.settings[key], value_type: SETTING_TYPES[key] || typeof appDb.settings[key] })),
      customers: clone(appDb.sheets.customers),
      products: clone(appDb.sheets.products),
      doc_headers: clone(appDb.sheets.doc_headers),
      doc_items: clone(appDb.sheets.doc_items),
      doc_sequences: clone(appDb.sheets.doc_sequences)
    };
  };

  async function initOnlineReadyMode(){
    ensureDb();
    renderPage();
    await bootstrapRemoteDb(false);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => { initOnlineReadyMode(); });
  else initOnlineReadyMode();
})();

</script>
