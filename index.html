  <script>
// ==================== STATE ====================
let allData = [];
let currentPage = 'dashboard';
let companySettings = {
  company_name: 'PT. Nama Perusahaan',
  company_description: 'Contractor & Supplier',
  company_address: 'Jl. Contoh Alamat No. 123',
  company_city: 'Jakarta',
  company_phone: '021-12345678',
  company_email: 'info@perusahaan.com',
  doc_accent: '#4f46e5',
  sph_notes: 'Penawaran berlaku 30 hari sejak tanggal surat.',
  invoice_notes: 'Pembayaran dapat ditransfer ke rekening perusahaan.',
  sph_terms: 'Syarat dan ketentuan SPH berlaku sesuai dengan peraturan perusahaan.',
  invoice_terms: 'Syarat dan ketentuan Invoice berlaku sesuai dengan peraturan perusahaan.',
  director_name: 'Nama Direktur',
  director_title: 'Direktur Utama',
  sph_format: 'SPH-{NUM}/{ABBR}/{MM}/{YY}',
  inv_format: 'INV-{NUM}/{ABBR}/{MM}/{YY}',
  logo_data: '',
  signature_data: '',
  show_secondary_signature: false,
  secondary_signature_label: 'Menyetujui,',
  secondary_signature_name: '',
  secondary_signature_title: '',
  secondary_signature_data: '',
  show_logo_watermark: true,
  ppn_rate: 11,
  ppn_enabled: true,
  discount_enabled: false,
  shipping_enabled: false,
  pph_enabled: false,
  pph_rate: 15,
  api_web_app_url: '',
  api_auto_sync: false,
  api_last_sync: ''
};
let editingRecord = null;
let docFormItems = [];
let docFormType = 'SPH';
let currentRecordCount = 0;
let docFormState = {
  ppn_active: true,
  discount: 0,
  shipping_cost: 0,
  tax_pph: 0
};

// ==================== HELPERS ====================
function getByCategory(cat) { return allData.filter(d => d.data_category === cat); }
function getCustomers() { return getByCategory('customer'); }
function getProducts() { return getByCategory('product'); }
function getSPHs() { return getByCategory('sph'); }
function getInvoices() { return getByCategory('invoice'); }
function getSettings() { return getByCategory('setting'); }
function getDocuments() { return [...getSPHs(), ...getInvoices()]; }

function formatCurrency(n) {
  return new Intl.NumberFormat('id-ID', { style:'currency', currency:'IDR', minimumFractionDigits:0, maximumFractionDigits:0 }).format(n || 0);
}
function formatDate(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
}
function formatDateShort(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function terbilang(n) {
  if (n === 0) return 'Nol Rupiah';
  const satuan = ['','Satu','Dua','Tiga','Empat','Lima','Enam','Tujuh','Delapan','Sembilan','Sepuluh','Sebelas'];
  function convert(x) {
    x = Math.floor(x);
    if (x < 12) return satuan[x];
    if (x < 20) return satuan[x-10] + ' Belas';
    if (x < 100) return satuan[Math.floor(x/10)] + ' Puluh' + (x%10?' '+satuan[x%10]:'');
    if (x < 200) return 'Seratus' + (x%100?' '+convert(x%100):'');
    if (x < 1000) return satuan[Math.floor(x/100)] + ' Ratus' + (x%100?' '+convert(x%100):'');
    if (x < 2000) return 'Seribu' + (x%1000?' '+convert(x%1000):'');
    if (x < 1000000) return convert(Math.floor(x/1000)) + ' Ribu' + (x%1000?' '+convert(x%1000):'');
    if (x < 1000000000) return convert(Math.floor(x/1000000)) + ' Juta' + (x%1000000?' '+convert(x%1000000):'');
    if (x < 1000000000000) return convert(Math.floor(x/1000000000)) + ' Miliar' + (x%1000000000?' '+convert(x%1000000000):'');
    return convert(Math.floor(x/1000000000000)) + ' Triliun' + (x%1000000000000?' '+convert(x%1000000000000):'');
  }
  return convert(n) + ' Rupiah';
}

function getRomanMonth(value) {
  const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  const monthIndex = Math.max(0, Math.min(11, Number(value) || 0));
  return romans[monthIndex] || 'I';
}

function normalizeDocumentFormat(fmtRaw, normalizedType) {
  const defaultFmt = normalizedType === 'sph' ? 'SPH-{NUM}/{ABBR}/{MM}/{YY}' : 'INV-{NUM}/{ABBR}/{MM}/{YY}';
  let fmt = String(fmtRaw || '').trim() || defaultFmt;
  fmt = fmt.replaceAll('SSG', '{ABBR}');
  fmt = fmt.replace(/(^|[\/\-\s])(PREFIX)(?=($|[\/\-\s]))/g, '$1{PREFIX}');
  fmt = fmt.replace(/(^|[\/\-\s])(NUM)(?=($|[\/\-\s]))/g, '$1{NUM}');
  fmt = fmt.replace(/(^|[\/\-\s])(ABBR)(?=($|[\/\-\s]))/g, '$1{ABBR}');
  fmt = fmt.replace(/(^|[\/\-\s])(MM_NUM)(?=($|[\/\-\s]))/g, '$1{MM_NUM}');
  fmt = fmt.replace(/(^|[\/\-\s])(YYYY)(?=($|[\/\-\s]))/g, '$1{YYYY}');
  fmt = fmt.replace(/(^|[\/\-\s])(YY)(?=($|[\/\-\s]))/g, '$1{YY}');
  fmt = fmt.replace(/(^|[\/\-\s])(MM)(?=($|[\/\-\s]))/g, '$1{MM}');
  return fmt;
}

function formatDocumentNumber(docType, runningNumber, docDate, abbr='SSG') {
  const normalizedType = docType === 'SPH' || docType === 'sph' ? 'sph' : 'invoice';
  const dt = new Date(docDate || new Date().toISOString());
  const safeDt = Number.isNaN(dt.getTime()) ? new Date() : dt;
  const year = safeDt.getFullYear();
  const yy = String(year).slice(-2);
  const mmNum = String(safeDt.getMonth() + 1).padStart(2, '0');
  const mmRoman = getRomanMonth(safeDt.getMonth());
  const num = String(Math.max(1, Number(runningNumber) || 1)).padStart(3, '0');
  const prefix = normalizedType === 'sph' ? 'SPH' : 'INV';
  const fmtRaw = normalizedType === 'sph' ? companySettings.sph_format : companySettings.inv_format;
  const fmt = normalizeDocumentFormat(fmtRaw, normalizedType);
  return String(fmt || '')
    .replaceAll('{PREFIX}', prefix)
    .replaceAll('{NUM}', num)
    .replaceAll('{ABBR}', (abbr || 'SSG').toUpperCase())
    .replaceAll('{YY}', yy)
    .replaceAll('{YYYY}', String(year))
    .replaceAll('{MM_NUM}', mmNum)
    .replaceAll('{MM}', mmRoman);
}

function parseDocumentNumber(docNumber, type) {
  const expectedPrefix = type === 'SPH' || type === 'sph' ? 'SPH' : 'INV';
  const match = String(docNumber || '').trim().match(/^([A-Za-z]+)-(\d+)(?:\/([^\/]+))?(?:\/([^\/]+))?(?:\/([^\/]+))?$/);
  if (!match) return null;
  const prefix = String(match[1] || '').toUpperCase();
  if (prefix !== expectedPrefix) return null;
  return {
    prefix,
    runningNumber: Math.max(1, parseInt(match[2], 10) || 1),
    abbr: (match[3] || 'SSG').trim() || 'SSG'
  };
}

function syncDocNumberWithDate(forceAuto=false) {
  const docNumEl = document.getElementById('docNum');
  const docDateEl = document.getElementById('docDate');
  if (!docNumEl || !docDateEl) return;
  const docDate = docDateEl.value || new Date().toISOString().split('T')[0];
  const current = (docNumEl.value || '').trim();
  if (forceAuto || !current) {
    docNumEl.value = peekNextDocumentNumber(docFormType, docDate, editingRecord?.__backendId);
    return;
  }
  const parsed = parseDocumentNumber(current, docFormType);
  if (!parsed) return;
  docNumEl.value = formatDocumentNumber(docFormType, parsed.runningNumber, docDate, parsed.abbr);
}

function generateDocNumber(type) {
  const dateInput = document.getElementById('docDate')?.value || new Date().toISOString().split('T')[0];
  return peekNextDocumentNumber(type, dateInput, editingRecord?.__backendId);
}

function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const colors = { success:'bg-emerald-500', error:'bg-red-500', info:'bg-brand-500' };
  const icons = { success:'check-circle', error:'alert-circle', info:'info' };
  const t = document.createElement('div');
  t.className = `toast flex items-center gap-2 px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg ${colors[type]}`;
  t.innerHTML = `<i data-lucide="${icons[type]}" class="w-4 h-4"></i>${msg}`;
  c.appendChild(t);
  lucide.createIcons({attrs:{class:'w-4 h-4'},nameAttr:'data-lucide'});
  setTimeout(() => t.remove(), 3000);
}

function showModal(content, wide=false) {
  const m = document.getElementById('modalContainer');
  m.className = 'fixed inset-0 z-[9998] flex items-center justify-center no-print';
  m.innerHTML = `<div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
    <div class="relative bg-white rounded-xl shadow-2xl ${wide?'w-[90%] max-w-5xl':'w-full max-w-lg'} max-h-[90%] overflow-y-auto fade-in z-10">${content}</div>`;
  lucide.createIcons({attrs:{class:''},nameAttr:'data-lucide'});
}
function closeModal() { document.getElementById('modalContainer').className = 'hidden fixed inset-0 z-[9998] no-print'; }

// ==================== NAVIGATION ====================
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  renderPage();
}

function renderPage() {
  const main = document.getElementById('mainContent');
  switch(currentPage) {
    case 'dashboard': main.innerHTML = renderDashboard(); break;
    case 'sph': main.innerHTML = renderDocList('SPH'); break;
    case 'invoice': main.innerHTML = renderDocList('Invoice'); break;
    case 'transaksi': main.innerHTML = renderTransaksi(); break;
    case 'customer': main.innerHTML = renderCustomerPage(); break;
    case 'produk': main.innerHTML = renderProdukPage(); break;
    case 'rekap': main.innerHTML = renderRekap(); break;
    case 'settings': main.innerHTML = renderSettings(); break;
    default: main.innerHTML = renderDashboard();
  }
  lucide.createIcons({attrs:{class:''},nameAttr:'data-lucide'});
}

          <span class="text-xs font-medium text-violet-500 bg-violet-50 px-2 py-0.5 rounded-full">CUS</span>

// ==================== DOC LIST (SPH / Invoice) ====================

  const docs = type === 'SPH' ? getSPHs() : getInvoices();

  const icon = type==='SPH'?'file-plus':'receipt';
  const color = type==='SPH'?'blue':'emerald';

    <div class="flex items-center justify-between mb-6">
      <div><h2 class="text-2xl font-bold text-surface-900">Daftar ${type}</h2><p class="text-sm text-surface-500">Kelola ${type === 'SPH' ? 'Surat Penawaran Harga' : 'Invoice'} Anda</p></div>

        <i data-lucide="plus" class="w-4 h-4"></i>Buat ${type} Baru
      </button>
    </div>

      <td class="px-5 py-3 font-medium text-surface-800">${d.doc_number||'-'}</td>
      <td class="px-5 py-3 text-surface-600">${d.customer_company||d.customer_name||'-'}</td>

          <button onclick="printDoc('${d.__backendId}')" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-500 transition-colors" title="Print"><i data-lucide="printer" class="w-4 h-4"></i></button>
          <button onclick="editDocument('${d.__backendId}')" class="p-1.5 rounded-lg hover:bg-blue-50 text-blue-500 transition-colors" title="Edit Dokumen"><i data-lucide="pencil" class="w-4 h-4"></i></button>
          ${type==='SPH'?`<button onclick="convertToInvoice('${d.__backendId}')" class="p-1.5 rounded-lg hover:bg-emerald-50 text-emerald-500 transition-colors" title="Konversi ke Invoice"><i data-lucide="arrow-right-circle" class="w-4 h-4"></i></button>`:''}
          <button onclick="confirmDeleteDoc('${d.__backendId}')" class="p-1.5 rounded-lg hover:bg-red-50 text-red-400 transition-colors" title="Hapus"><i data-lucide="trash-2" class="w-4 h-4"></i></button>

function filterDocList(type) {
  const q = document.getElementById(`searchDoc${type}`).value.toLowerCase();
  const docs = (type === 'SPH' ? getSPHs() : getInvoices()).filter(d =>
    (d.doc_number||'').toLowerCase().includes(q) || (d.customer_company||'').toLowerCase().includes(q) || (d.customer_name||'').toLowerCase().includes(q)
  ).sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
  document.getElementById(`docListTable${type}`).innerHTML = renderDocTable(docs, type);
  lucide.createIcons({attrs:{class:''},nameAttr:'data-lucide'});
}

// ==================== DOC FORM ====================

  editingRecord = prefill;

    tax_pph: prefill ? (prefill.tax_pph || 0) : 0
  };
  const custs = getCustomers();
  const prods = getProducts();
  const docNum = prefill ? prefill.doc_number : generateDocNumber(type);
  
  const content = `<div class="p-6">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold text-surface-900">Buat ${type} Baru</h3>
      <button onclick="closeModal()" class="p-1.5 hover:bg-surface-100 rounded-lg"><i data-lucide="x" class="w-5 h-5 text-surface-400"></i></button>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div><label class="text-xs font-medium text-surface-600 mb-1 block">No. Dokumen</label><input id="docNum" class="input-field" value="${docNum}" placeholder="SPH-001/SSG/IV/26"><div class="text-[11px] text-surface-500 mt-1">Nomor otomatis, tetap bisa diedit manual.</div></div>
      <div><label class="text-xs font-medium text-surface-600 mb-1 block">Tanggal</label><input id="docDate" type="date" class="input-field" value="${prefill ? prefill.doc_date : new Date().toISOString().split('T')[0]}" onchange="syncDocNumberWithDate()"></div>
    </div>
    <div class="mb-4">
      <label class="text-xs font-medium text-surface-600 mb-1 block">Customer</label>
      <select id="docCustomer" class="input-field" onchange="fillCustomerDetail()">
        <option value="">Pilih Customer</option>
        ${custs.map(c => `<option value="${c.__backendId}" ${prefill && prefill.customer_name===c.customer_name?'selected':''}>${c.customer_name} - ${c.customer_company||''}</option>`).join('')}
      </select>
    </div>
    <div id="custDetail" class="mb-4 p-3 bg-surface-50 rounded-lg text-xs text-surface-600 hidden"></div>
    
    <div class="mb-4">
      <div class="flex items-center justify-between mb-2">
        <label class="text-xs font-semibold text-surface-700">Item Barang</label>
        <div class="flex gap-2">
          <select id="productSelect" class="input-field text-xs py-1.5 w-48">
            <option value="">Tambah dari Produk...</option>
            ${prods.map(p => `<option value="${p.__backendId}">${p.product_code} - ${p.product_name}</option>`).join('')}
          </select>
          <button onclick="addProductItem()" class="btn-secondary text-xs px-3 py-1.5 rounded-lg">Tambah</button>
        </div>
      </div>
      <div id="docItemsContainer">${renderDocFormItems()}</div>
      <button onclick="addDocItem()" class="mt-2 text-xs text-brand-600 font-medium flex items-center gap-1 hover:text-brand-700"><i data-lucide="plus-circle" class="w-3.5 h-3.5"></i>Tambah Baris</button>
    </div>
    
    <div class="bg-amber-50 rounded-lg p-4 mb-4 border border-amber-200">
      <div class="text-xs font-semibold text-amber-900 mb-3">Opsi Pajak & Biaya</div>
      <div class="space-y-2">
        ${companySettings.ppn_enabled ? `<label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="ppnCheck" ${docFormState.ppn_active ? 'checked' : ''} onchange="updateDocForm()" class="w-4 h-4 accent-amber-600">
          <span class="text-xs text-amber-900">PPN ${companySettings.ppn_rate}%</span>
        </label>` : ''}
        ${companySettings.discount_enabled ? `<div class="flex items-center gap-2">
          <input type="number" id="discountInput" class="input-field text-xs w-24" placeholder="Diskon" value="${docFormState.discount}" min="0" onchange="updateDocForm()">
          <span class="text-xs text-amber-900">Diskon</span>
        </div>` : ''}
        ${companySettings.shipping_enabled ? `<div class="flex items-center gap-2">
          <input type="number" id="shippingInput" class="input-field text-xs w-24" placeholder="Biaya" value="${docFormState.shipping_cost}" min="0" onchange="updateDocForm()">
          <span class="text-xs text-amber-900">Biaya Tambahan</span>
        </div>` : ''}
        ${companySettings.pph_enabled ? `<div class="flex items-center gap-2">
          <input type="number" id="pphInput" class="input-field text-xs w-24" placeholder="PPH" value="${docFormState.tax_pph}" min="0" onchange="updateDocForm()">
          <span class="text-xs text-amber-900">PPH ${companySettings.pph_rate}%</span>
        </div>` : ''}
      </div>
    </div>

function renderDocFormItems() {
  return `<div class="space-y-2 max-h-96 overflow-y-auto pr-2 border border-surface-200 rounded-lg p-2 bg-surface-50">${docFormItems.length ? docFormItems.map((item,i) => `
    <div class="flex gap-2 items-start bg-white p-3 rounded-lg border border-surface-200">
      <div class="flex-shrink-0 flex items-center justify-center w-6 h-6 bg-brand-100 text-brand-600 text-xs font-semibold rounded">${i+1}</div>
      <input class="input-field text-xs flex-[2]" placeholder="Nama Barang" value="${item.name||''}" onchange="updateDocItem(${i},'name',this.value)">
      <input class="input-field text-xs w-16 text-center" placeholder="UoM" value="${item.uom||''}" onchange="updateDocItem(${i},'uom',this.value)">
      <input type="number" class="input-field text-xs w-16 text-center" placeholder="Qty" value="${item.qty||1}" min="1" onchange="updateDocItem(${i},'qty',this.value)">
      <input type="number" class="input-field text-xs w-24" placeholder="Harga" value="${item.price||0}" onchange="updateDocItem(${i},'price',this.value)">
      <div class="text-xs font-semibold text-brand-600 w-28 text-right flex-shrink-0">${formatCurrency((item.qty||0)*(item.price||0))}</div>
      <button onclick="removeDocItem(${i})" class="flex-shrink-0 p-1.5 hover:bg-red-50 rounded text-red-400 transition-colors" title="Hapus"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>`).join('') : '<div class="text-xs text-surface-400 text-center py-6">Belum ada item. Klik "Tambah Baris" untuk menambahkan item (unlimited).</div>'}</div>`;
}

function renderDocTotals() {
  const sub = docFormItems.reduce((s,i)=>s+(i.qty||0)*(i.price||0),0);
  const ppnAmount = docFormState.ppn_active ? Math.round(sub * (companySettings.ppn_rate/100)) : 0;
  const discountAmount = docFormState.discount || 0;
  const shippingAmount = docFormState.shipping_cost || 0;
  const pphAmount = docFormState.tax_pph || 0;
  const grand = sub - discountAmount + ppnAmount + shippingAmount - pphAmount;
  
  let html = `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">Subtotal</span><span class="font-medium">${formatCurrency(sub)}</span></div>`;
  if (companySettings.discount_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">Diskon</span><span class="font-medium">-${formatCurrency(discountAmount)}</span></div>`;
  if (companySettings.ppn_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">PPN ${companySettings.ppn_rate}%</span><span class="font-medium">${docFormState.ppn_active ? formatCurrency(ppnAmount) : '0'}</span></div>`;
  if (companySettings.shipping_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">Biaya Tambahan</span><span class="font-medium">+${formatCurrency(shippingAmount)}</span></div>`;
  if (companySettings.pph_enabled) html += `<div class="flex justify-between text-xs mb-1"><span class="text-surface-500">PPH ${companySettings.pph_rate}%</span><span class="font-medium">-${formatCurrency(pphAmount)}</span></div>`;
  
  html += `<div class="border-t border-surface-200 my-2"></div>
    <div class="flex justify-between text-sm"><span class="font-semibold text-surface-800">Grand Total</span><span class="font-bold text-brand-600">${formatCurrency(grand)}</span></div>
    <div class="text-[10px] text-surface-400 mt-1 italic">${terbilang(grand)}</div>`;
  return html;
}

function updateDocItem(idx, field, val) {
  if (field==='qty') docFormItems[idx].qty = parseInt(val)||0;
  else if (field==='price') docFormItems[idx].price = parseFloat(val)||0;
  else docFormItems[idx][field] = val;
  document.getElementById('docTotals').innerHTML = renderDocTotals();
}

function addDocItem() {
  docFormItems.push({ name:'', qty:1, price:0, uom:'' });
  document.getElementById('docItemsContainer').innerHTML = renderDocFormItems();
  document.getElementById('docTotals').innerHTML = renderDocTotals();
  lucide.createIcons({attrs:{class:''},nameAttr:'data-lucide'});
}

function removeDocItem(idx) {
  docFormItems.splice(idx, 1);
  document.getElementById('docItemsContainer').innerHTML = renderDocFormItems();
  document.getElementById('docTotals').innerHTML = renderDocTotals();
  lucide.createIcons({attrs:{class:''},nameAttr:'data-lucide'});
}

function updateDocForm() {
  docFormState.ppn_active = document.getElementById('ppnCheck')?.checked ?? docFormState.ppn_active;
  docFormState.discount = parseFloat(document.getElementById('discountInput')?.value || 0);
  docFormState.shipping_cost = parseFloat(document.getElementById('shippingInput')?.value || 0);
  docFormState.tax_pph = parseFloat(document.getElementById('pphInput')?.value || 0);
  document.getElementById('docTotals').innerHTML = renderDocTotals();
}

function addProductItem() {
  const sel = document.getElementById('productSelect');
  if (!sel.value) return;
  const prod = getProducts().find(p => p.__backendId === sel.value);
  if (prod) {
    docFormItems.push({ name: prod.product_name, qty: 1, price: prod.product_price||0, uom: prod.product_uom||'' });
    document.getElementById('docItemsContainer').innerHTML = renderDocFormItems();
    document.getElementById('docTotals').innerHTML = renderDocTotals();
    lucide.createIcons({attrs:{class:''},nameAttr:'data-lucide'});
    sel.value = '';
  }
}

function fillCustomerDetail() {
  const sel = document.getElementById('docCustomer');
  const det = document.getElementById('custDetail');
  if (!sel.value) { det.classList.add('hidden'); return; }
  const c = getCustomers().find(x => x.__backendId === sel.value);
  if (c) {
    det.classList.remove('hidden');
    det.innerHTML = `<strong>${c.customer_name}</strong> — ${c.customer_company||''}<br>${c.customer_address||''}, ${c.customer_city||''}<br>HP: ${c.customer_phone||'-'} | Email: ${c.customer_email||'-'}`;
  }
}

async function saveDocument() {
  const btn = document.getElementById('saveDocBtn');
  const custSel = document.getElementById('docCustomer');
  const cust = getCustomers().find(x => x.__backendId === custSel.value);
  
  if (!custSel.value) { showToast('Pilih customer terlebih dahulu', 'error'); return; }
  if (!docFormItems.some(i => i.name && i.name.trim())) { showToast('Tambahkan minimal 1 item dengan nama', 'error'); return; }
  if (!editingRecord && currentRecordCount >= 999) { showToast('Batas data tercapai (999). Hapus data lama.', 'error'); return; }

  const sub = docFormItems.reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.price)||0),0);
  const ppnAmount = docFormState.ppn_active ? Math.round(sub * (companySettings.ppn_rate/100)) : 0;
  const discountAmount = parseFloat(docFormState.discount) || 0;
  const shippingAmount = parseFloat(docFormState.shipping_cost) || 0;
  const pphAmount = parseFloat(docFormState.tax_pph) || 0;
  const grand = sub - discountAmount + ppnAmount + shippingAmount - pphAmount;

  btn.disabled = true; btn.textContent = editingRecord ? 'Mengupdate...' : 'Menyimpan...';

  const record = {
    type: docFormType === 'SPH' ? 'sph' : 'invoice',
    data_category: docFormType === 'SPH' ? 'sph' : 'invoice',
    doc_number: document.getElementById('docNum').value || '',
    doc_date: document.getElementById('docDate').value || new Date().toISOString().split('T')[0],
    customer_name: cust.customer_name || '',
    customer_company: cust.customer_company || '',
    customer_address: cust.customer_address || '',
    customer_city: cust.customer_city || '',
    customer_phone: cust.customer_phone || '',
    customer_email: cust.customer_email || '',
    items_json: JSON.stringify(docFormItems),
    subtotal: Math.round(sub), 
    ppn: ppnAmount, 
    ppn_active: docFormState.ppn_active ? 1 : 0,
    discount: Math.round(discountAmount), 
    shipping_cost: Math.round(shippingAmount), 
    tax_pph: Math.round(pphAmount),
    grand_total: Math.round(grand), 
    terbilang: terbilang(grand),
    notes: '',
    status: 'active',
    source_doc: '',
    created_at: editingRecord ? editingRecord.created_at : new Date().toISOString(),
    company_name:'', 
    company_address:'', 
    company_city:'', 
    company_phone:'', 
    company_email:'',
    product_code:'', 
    product_name:'', 
    product_uom:'', 
    product_price: 0, 
    product_desc:'',
    setting_key:'', 
    setting_value:'',
    logo_data: '',
    signature_data: ''
  };

  let result;
  if (editingRecord) {
    result = await window.dataSdk.update({...editingRecord, ...record});
  } else {
    result = await window.dataSdk.create(record);
  }
  
  btn.disabled = false; 
  btn.textContent = editingRecord ? 'Update' : 'Simpan';
  
  if (result.isOk) { 
    showToast(`${docFormType} berhasil ${editingRecord ? 'diupdate' : 'disimpan'}!`); 
    closeModal();
    docFormItems = [];
    editingRecord = null;
    docFormState = { ppn_active: true, discount: 0, shipping_cost: 0, tax_pph: 0 };
  }
  else { 
    showToast(`Gagal menyimpan: ${result.error?.message || 'Error tidak diketahui'}`, 'error'); 
  }
}

function printDoc(id) {
  const doc = allData.find(d => d.__backendId === id);
  if (!doc) return;
  const html = generateDocHTML(doc);
  const fileName = `${doc.doc_number}_${doc.customer_company || doc.customer_name || 'Customer'}`;
  const accent = companySettings.doc_accent || '#4f46e5';

  const parser = new DOMParser();
  const parsed = parser.parseFromString(html, 'text/html');
  const previewRoot = parsed.querySelector('.doc-preview');
  const contentRoot = previewRoot ? previewRoot.querySelector('div[style*="position:relative;z-index:1"]') : null;
  const headerEl = contentRoot ? contentRoot.querySelector('.doc-company-header') : null;
  const watermarkEl = previewRoot ? previewRoot.querySelector('.doc-watermark-layer') : null;

  const headerHtml = headerEl ? headerEl.outerHTML : '';
  const watermarkHtml = watermarkEl ? watermarkEl.outerHTML : '';

  if (headerEl) headerEl.remove();

  const bodyInnerHtml = contentRoot ? contentRoot.innerHTML : html;
  const printHtml = `<div class="doc-preview" style="--doc-accent:${accent};position:relative;overflow:hidden">
    ${watermarkHtml}
    <div style="position:relative;z-index:1">
      <table class="doc-print-frame" role="presentation">
        <thead>
          <tr>
            <td>${headerHtml}</td>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>${bodyInnerHtml}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;

  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${fileName}</title>
    <style>
      @page{size:A4;margin:12mm 14mm}
      html,body{margin:0;padding:0;background:white}
      body{font-family:'Plus Jakarta Sans',Helvetica,Arial,sans-serif;color:#1e293b;--doc-accent:${accent}}
      .doc-preview{padding:0;font-size:9.5pt;line-height:1.35;color:#1e293b;position:relative;overflow:hidden}
      .doc-print-frame{width:100%;border-collapse:collapse;table-layout:fixed}
      .doc-print-frame thead{display:table-header-group}
      .doc-print-frame tbody{display:table-row-group}
      .doc-print-frame tr,.doc-print-frame td{padding:0;margin:0;border:none;vertical-align:top}
      .doc-print-frame > thead > tr > td{padding:0 0 10px 0}
      .doc-print-frame .doc-company-header{margin:0 !important}
      .doc-print-frame .doc-title-block{margin:0 0 12px !important}
      .doc-watermark-layer{position:fixed !important;inset:0 !important;display:flex !important;align-items:center !important;justify-content:center !important;pointer-events:none !important;z-index:0 !important;overflow:hidden !important}
      .doc-watermark-image{width:52vw !important;max-width:420px !important;min-width:260px !important;max-height:320px !important;object-fit:contain !important;opacity:0.09 !important;transform:translateY(-8px) !important}
      .doc-preview > div:last-child,.doc-preview > div[style*='position:relative;z-index:1']{position:relative;z-index:1}
      .doc-preview table:not(.doc-print-frame){width:100%;border-collapse:collapse;table-layout:fixed}
      .doc-preview table:not(.doc-print-frame) th,.doc-preview table:not(.doc-print-frame) td{border:1px solid #cbd5e1;padding:4px 6px;vertical-align:top;word-break:break-word;page-break-inside:avoid;break-inside:avoid}
      .doc-preview table:not(.doc-print-frame) th{background:var(--doc-accent,#4f46e5);color:white;font-weight:600;page-break-after:avoid}
      .doc-preview tbody tr{page-break-inside:avoid;break-inside:avoid}
      .doc-footer-group{page-break-inside:auto;break-inside:auto}
      .doc-after-closing-group,.doc-note-section,.doc-terms-section,.doc-signature-section{page-break-inside:avoid;break-inside:avoid}
      .doc-signature-section > div{page-break-inside:avoid;break-inside:avoid}
      .doc-note-section .doc-text-lines,.doc-terms-section .doc-text-lines{display:block}
      .doc-note-section .doc-text-lines > div,.doc-terms-section .doc-text-lines > div{margin:0}
      .doc-break-before-page{page-break-before:always !important;break-before:page !important}
    </style>
  </head><body>${printHtml}
    <script>
      (function(){
        function mmToPx(mm) {
          const probe = document.createElement('div');
          probe.style.position = 'absolute';
          probe.style.visibility = 'hidden';
          probe.style.height = mm + 'mm';
          probe.style.width = '1px';
          document.body.appendChild(probe);
          const px = probe.getBoundingClientRect().height;
          probe.remove();
          return px;
        }

        function relativeTop(container, el) {
          const c = container.getBoundingClientRect();
          const e = el.getBoundingClientRect();
          return e.top - c.top;
        }

        function relativeBottom(container, el) {
          const c = container.getBoundingClientRect();
          const e = el.getBoundingClientRect();
          return e.bottom - c.top;
        }

        function fitsSinglePage(container, el, pageHeight) {
          if (!container || !el || pageHeight <= 0) return true;
          const top = Math.max(0, relativeTop(container, el));
          const bottom = Math.max(top, relativeBottom(container, el) - 1);
          return Math.floor(top / pageHeight) === Math.floor(bottom / pageHeight);
        }

        function prepareSignatureLayout() {
          document.querySelectorAll('.doc-preview').forEach((doc) => {
            const afterClosingGroup = doc.querySelector('.doc-after-closing-group');
            const signatureSection = doc.querySelector('.doc-signature-section');
            const targetGroup = afterClosingGroup || signatureSection;
            if (!targetGroup) return;

            const printFrame = doc.querySelector('.doc-print-frame');
            const repeatedHeader = printFrame ? printFrame.querySelector('thead') : null;
            const repeatedHeaderHeight = repeatedHeader ? repeatedHeader.getBoundingClientRect().height : 0;
            const pageHeight = Math.max(1, mmToPx(273) - repeatedHeaderHeight);

            targetGroup.classList.remove('doc-break-before-page');
            void doc.offsetHeight;

            if (!fitsSinglePage(doc, targetGroup, pageHeight)) {
              targetGroup.classList.add('doc-break-before-page');
              void doc.offsetHeight;
            }
          });
        }

        function startPrint() {
          prepareSignatureLayout();
          setTimeout(function(){ window.print(); }, 180);
        }

        if (document.readyState === 'complete') startPrint();
        else window.addEventListener('load', startPrint, { once:true });
        window.addEventListener('afterprint', function(){ window.close(); });
      })();
    <\/script>
  </body></html>`);
  w.document.close();
}

async function deleteDoc(id) {
  const rec = allData.find(d => d.__backendId === id);
  if (!rec) return;
  const btn = document.getElementById('delDocBtn');
  if(btn){ btn.disabled=true; btn.textContent='Menghapus...'; }
  const result = await window.dataSdk.delete(rec);
  if (result.isOk) { showToast('Dokumen berhasil dihapus'); closeModal(); }
  else { showToast('Gagal menghapus', 'error'); if(btn){btn.disabled=false;btn.textContent='Hapus';} }
}

      <div><h2 class="text-2xl font-bold text-surface-900">Transaksi</h2><p class="text-sm text-surface-500">Semua dokumen tahun ${year}</p></div>
      <div class="flex gap-2">
        <button onclick="printTransaksi()" class="btn-secondary flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium"><i data-lucide="printer" class="w-4 h-4"></i>Print</button>
        <button onclick="exportTransaksiCSV()" class="btn-success flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium"><i data-lucide="download" class="w-4 h-4"></i>Export CSV</button>
      </div>
    </div>
    <div class="flex gap-3 mb-4">
      <input type="text" placeholder="Cari dokumen..." class="input-field flex-1" id="searchTrx" oninput="filterTrx()">
      <select class="input-field w-40" id="filterTrxType" onchange="filterTrx()">

      </select>
    </div>
    <div class="bg-white rounded-xl border border-surface-100 shadow-sm overflow-hidden">
      <div class="overflow-x-auto" id="trxTable">${renderTrxTable(docs)}</div>
    </div>
  </div>`;
}

function renderTrxTable(docs) {
  return `<table class="w-full text-sm">
    <thead><tr class="bg-surface-50 text-surface-500 text-xs">
      <th class="text-left px-5 py-3 font-medium">No. Dokumen</th>
      <th class="text-left px-5 py-3 font-medium">Tipe</th>
      <th class="text-left px-5 py-3 font-medium">Customer</th>
      <th class="text-left px-5 py-3 font-medium">Tanggal</th>
      <th class="text-right px-5 py-3 font-medium">Subtotal</th>
      <th class="text-right px-5 py-3 font-medium">PPN</th>
      <th class="text-right px-5 py-3 font-medium">Grand Total</th>
      <th class="text-center px-5 py-3 font-medium">Aksi</th>
    </tr></thead>
    <tbody>${docs.length ? docs.map(d => `<tr class="table-row border-b border-surface-50">
      <td class="px-5 py-3 font-medium text-surface-800">${d.doc_number||'-'}</td>
      <td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${d.data_category==='sph'?'bg-blue-50 text-blue-600':'bg-emerald-50 text-emerald-600'}">${d.data_category==='sph'?'SPH':'Invoice'}</span></td>
      <td class="px-5 py-3 text-surface-600">${d.customer_company||d.customer_name||'-'}</td>
      <td class="px-5 py-3 text-surface-500">${formatDateShort(d.doc_date||d.created_at)}</td>
      <td class="px-5 py-3 text-right">${formatCurrency(d.subtotal)}</td>
      <td class="px-5 py-3 text-right">${formatCurrency(d.ppn)}</td>
      <td class="px-5 py-3 text-right font-semibold">${formatCurrency(d.grand_total)}</td>
      <td class="px-5 py-3 text-center">
        <button onclick="previewDoc('${d.__backendId}')" class="p-1.5 rounded-lg hover:bg-surface-100 text-surface-500"><i data-lucide="eye" class="w-4 h-4"></i></button>
      </td>
    </tr>`).join('') : '<tr><td colspan="8" class="px-5 py-8 text-center text-surface-400">Belum ada transaksi</td></tr>'}</tbody>
  </table>`;
}

function filterTrx() {
  const q = document.getElementById('searchTrx').value.toLowerCase();
  const t = document.getElementById('filterTrxType').value;
  let docs = getDocuments();
  if (t) docs = docs.filter(d => d.data_category === t);
  if (q) docs = docs.filter(d => (d.doc_number||'').toLowerCase().includes(q) || (d.customer_company||'').toLowerCase().includes(q) || (d.customer_name||'').toLowerCase().includes(q));
  docs.sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
  document.getElementById('trxTable').innerHTML = renderTrxTable(docs);
  lucide.createIcons({attrs:{class:''},nameAttr:'data-lucide'});
}

function exportTransaksiCSV() {
  const docs = getDocuments().sort((a,b)=>new Date(b.doc_date||b.created_at)-new Date(a.doc_date||a.created_at));
  let csv = 'No Dokumen,Tipe,Customer,Perusahaan,Tanggal,Subtotal,PPN,Grand Total\n';
  docs.forEach(d => {
    csv += `"${d.doc_number}","${d.data_category==='sph'?'SPH':'Invoice'}","${d.customer_name}","${d.customer_company}","${formatDateShort(d.doc_date||d.created_at)}",${d.subtotal},${d.ppn},${d.grand_total}\n`;
  });
  downloadFile(csv, `Transaksi_${new Date().getFullYear()}.csv`, 'text/csv');
}

function printTransaksi() {
  const docs = getDocuments().sort((a,b)=>new Date(b.doc_date||b.created_at)-new Date(a.doc_date||a.created_at));
  const year = new Date().getFullYear();
  
  let html = `<h2 style="text-align:center;margin-bottom:20px;font-size:18pt;font-weight:700">Laporan Transaksi ${year}</h2>
    <table style="width:100%;border-collapse:collapse;font-size:10pt">
      <thead><tr style="background:#f1f5f9">
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:left">No. Dokumen</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:left">Tipe</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:left">Customer</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:left">Perusahaan</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:center">Tanggal</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:right">Subtotal</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:right">PPN</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:right">Grand Total</th>
      </tr></thead>
      <tbody>`;
  
  let totalSubtotal = 0, totalPPN = 0, totalGrand = 0;
  docs.forEach(d => {
    totalSubtotal += d.subtotal || 0;
    totalPPN += d.ppn || 0;
    totalGrand += d.grand_total || 0;
    html += `<tr>
      <td style="border:1px solid #cbd5e1;padding:8px">${d.doc_number||'-'}</td>
      <td style="border:1px solid #cbd5e1;padding:8px">${d.data_category==='sph'?'SPH':'Invoice'}</td>
      <td style="border:1px solid #cbd5e1;padding:8px">${d.customer_name||'-'}</td>
      <td style="border:1px solid #cbd5e1;padding:8px">${d.customer_company||'-'}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:center">${formatDateShort(d.doc_date||d.created_at)}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(d.subtotal)}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(d.ppn)}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:right;font-weight:700">${formatCurrency(d.grand_total)}</td>
    </tr>`;
  });
  
  html += `<tr style="background:#f1f5f9;font-weight:700">
    <td style="border:1px solid #cbd5e1;padding:8px" colspan="5">TOTAL</td>
    <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(totalSubtotal)}</td>
    <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(totalPPN)}</td>
    <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(totalGrand)}</td>
  </tr></tbody>
    </table>
    <div style="margin-top:20px;font-size:9pt;color:#64748b">
      <p>Dicetak: ${formatDate(new Date().toISOString())}</p>
      <p>Perusahaan: ${companySettings.company_name}</p>
    </div>`;
  
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Laporan_Transaksi_${year}</title>
    <style>@page{size:A4;margin:15mm}body{margin:0;font-family:'Plus Jakarta Sans',Helvetica,Arial,sans-serif;padding:20px}</style>
  </head><body>${html}</body></html>`);
  w.document.close();
  setTimeout(() => { w.print(); }, 500);
}


function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

async function saveCustomer() {
  const name = document.getElementById('cf_name').value.trim();
  if (!name) { showToast('Nama harus diisi', 'error'); return; }
  const btn = document.getElementById('saveCustBtn');
  btn.disabled=true; btn.textContent='Menyimpan...';

  const data = {
    data_category: 'customer',
    customer_name: name,
    customer_company: document.getElementById('cf_company').value,
    customer_address: document.getElementById('cf_address').value,
    customer_city: document.getElementById('cf_city').value,
    customer_phone: document.getElementById('cf_phone').value,
    customer_email: document.getElementById('cf_email').value,
    type:'', doc_number:'', doc_date:'', items_json:'', subtotal:0, ppn:0, grand_total:0,
    terbilang:'', notes:'', status:'', source_doc:'', created_at: new Date().toISOString(),
    company_name:'', company_address:'', company_city:'', company_phone:'', company_email:'',
    product_code:'', product_name:'', product_uom:'', product_price:0, product_desc:'',
    setting_key:'', setting_value:''
  };

  let result;
  if (editingRecord) {
    result = await window.dataSdk.update({...editingRecord, ...data});
  } else {
    if (currentRecordCount >= 999) { showToast('Batas data tercapai (999)', 'error'); btn.disabled=false; btn.textContent='Simpan'; return; }
    result = await window.dataSdk.create(data);
  }
  btn.disabled=false; btn.textContent='Simpan';
  if (result.isOk) { showToast(`Customer berhasil ${editingRecord?'diupdate':'ditambahkan'}!`); closeModal(); editingRecord=null; }
  else showToast('Gagal menyimpan', 'error');
}

// ==================== CSV IMPORT ====================
function importCSV(type) {
  showModal(`<div class="p-6">
    <h3 class="text-lg font-bold text-surface-900 mb-4">Import CSV - ${type==='customer'?'Customer':'Produk'}</h3>
    <p class="text-sm text-surface-500 mb-3">Format CSV: ${type==='customer'?'Nama, Perusahaan, Alamat, Kota, HP, Email':'Kode, Nama, Satuan, Harga, Keterangan'}</p>
    <textarea id="csvInput" class="input-field font-mono text-xs" rows="8" placeholder="Paste data CSV di sini..."></textarea>
    <div class="flex gap-3 justify-end mt-4">
      <button onclick="closeModal()" class="btn-secondary px-4 py-2.5 rounded-lg text-sm font-medium">Batal</button>
      <button onclick="processCSV('${type}')" class="btn-primary px-6 py-2.5 rounded-lg text-sm font-medium" id="importBtn">Import</button>
    </div>
  </div>`);
}

async function processCSV(type) {
  const csv = document.getElementById('csvInput').value.trim();
  if (!csv) { showToast('Paste data CSV', 'error'); return; }
  const btn = document.getElementById('importBtn');
  btn.disabled=true; btn.textContent='Importing...';
  
  const lines = csv.split('\n').filter(l => l.trim());
  let count = 0;
  for (const line of lines) {
    if (currentRecordCount + count >= 999) { showToast(`Batas data tercapai. ${count} berhasil diimport.`, 'info'); break; }
    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
    
    if (type === 'customer' && cols.length >= 1) {
      await window.dataSdk.create({
        data_category:'customer', customer_name:cols[0]||'', customer_company:cols[1]||'',
        customer_address:cols[2]||'', customer_city:cols[3]||'', customer_phone:cols[4]||'', customer_email:cols[5]||'',
        type:'', doc_number:'', doc_date:'', items_json:'', subtotal:0, ppn:0, grand_total:0,
        terbilang:'', notes:'', status:'', source_doc:'', created_at:new Date().toISOString(),
        company_name:'', company_address:'', company_city:'', company_phone:'', company_email:'',
        product_code:'', product_name:'', product_uom:'', product_price:0, product_desc:'',
        setting_key:'', setting_value:''
      });
      count++;
    } else if (type === 'product' && cols.length >= 2) {
      await window.dataSdk.create({
        data_category:'product', product_code:cols[0]||'', product_name:cols[1]||'',
        product_uom:cols[2]||'', product_price:parseFloat(cols[3])||0, product_desc:cols[4]||'',
        type:'', doc_number:'', doc_date:'', customer_name:'', customer_company:'',
        customer_address:'', customer_city:'', customer_phone:'', customer_email:'',
        items_json:'', subtotal:0, ppn:0, grand_total:0, terbilang:'', notes:'',
        status:'', source_doc:'', created_at:new Date().toISOString(),
        company_name:'', company_address:'', company_city:'', company_phone:'', company_email:'',
        setting_key:'', setting_value:''
      });
      count++;
    }
  }
  btn.disabled=false; btn.textContent='Import';
  showToast(`${count} data berhasil diimport!`);
  closeModal();
}

async function deleteRecord(id) {
  const rec = allData.find(d => d.__backendId === id);
  if (!rec) return;
  const btn = document.getElementById('delRecBtn');
  if(btn){btn.disabled=true;btn.textContent='Menghapus...';}
  const result = await window.dataSdk.delete(rec);
  if (result.isOk) { showToast('Data berhasil dihapus'); closeModal(); }
  else { showToast('Gagal menghapus', 'error'); if(btn){btn.disabled=false;btn.textContent='Hapus';} }
}

// ==================== REKAP BULANAN ====================
function getAvailableYears() {
  const docs = getDocuments();
  const years = new Set();
  docs.forEach(d => {
    const dt = new Date(d.doc_date || d.created_at);
    years.add(dt.getFullYear());
  });
  return Array.from(years).sort((a,b) => b-a);
}

function renderRekap() {
  const availableYears = getAvailableYears();
  const selectedYear = parseInt(localStorage.getItem('rekapSelectedYear')) || new Date().getFullYear();
  
  const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const docs = getDocuments();
  
  const rekapData = months.map((m,i) => {
    const mDocs = docs.filter(d => { const dt = new Date(d.doc_date||d.created_at); return dt.getFullYear()===selectedYear && dt.getMonth()===i; });
    const mSPH = mDocs.filter(d=>d.data_category==='sph');
    const mInv = mDocs.filter(d=>d.data_category==='invoice');
    return { month:m, sph:mSPH.length, inv:mInv.length, total:mDocs.reduce((s,d)=>s+(d.grand_total||0),0), ppn:mDocs.reduce((s,d)=>s+(d.ppn||0),0) };
  });
  
  const grandTotal = rekapData.reduce((s,r)=>s+r.total,0);
  const grandPPN = rekapData.reduce((s,r)=>s+r.ppn,0);
  const hasData = rekapData.some(r => r.sph > 0 || r.inv > 0);

  return `<div class="p-6 fade-in">
    <div class="flex items-center justify-between mb-6">
      <div><h2 class="text-2xl font-bold text-surface-900">Rekap Bulanan</h2><p class="text-sm text-surface-500">Ringkasan transaksi per bulan</p></div>
      <div class="flex gap-2">
        <button onclick="printRekap()" class="btn-secondary flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium"><i data-lucide="printer" class="w-4 h-4"></i>Print</button>
        <button onclick="exportRekapCSV()" class="btn-success flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium"><i data-lucide="download" class="w-4 h-4"></i>Export CSV</button>
      </div>
    </div>
    
    <div class="mb-6 flex items-center gap-3">
      <label class="text-sm font-medium text-surface-600">Pilih Tahun:</label>
      <select id="rekapYearSelect" class="input-field w-40" onchange="changeRekapYear()">
        ${availableYears.length ? availableYears.map(y => `<option value="${y}" ${y===selectedYear?'selected':''}>${y}</option>`).join('') : '<option>Tidak ada data</option>'}
      </select>
    </div>

    ${!hasData ? `<div class="bg-amber-50 border border-amber-200 rounded-xl p-6 text-center mb-6">
      <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center mx-auto mb-3"><i data-lucide="calendar" class="w-6 h-6 text-amber-600"></i></div>
      <p class="text-sm font-medium text-amber-900">Belum ada data pada tahun ${selectedYear}</p>
      <p class="text-xs text-amber-700 mt-1">Data akan muncul setelah ada transaksi SPH atau Invoice di tahun ini</p>
    </div>` : `
    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-white rounded-xl p-5 border border-surface-100 shadow-sm">
        <div class="text-xs text-surface-400 mb-1">Total Transaksi ${selectedYear}</div>
        <div class="text-xl font-bold text-brand-600">${formatCurrency(grandTotal)}</div>
      </div>
      <div class="bg-white rounded-xl p-5 border border-surface-100 shadow-sm">
        <div class="text-xs text-surface-400 mb-1">Total PPN ${selectedYear}</div>
        <div class="text-xl font-bold text-amber-600">${formatCurrency(grandPPN)}</div>
      </div>
    </div>
    `}
    
    <div class="bg-white rounded-xl border border-surface-100 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="bg-surface-50 text-surface-500 text-xs">
            <th class="text-left px-5 py-3 font-medium">Bulan</th>
            <th class="text-center px-5 py-3 font-medium">Jml SPH</th>
            <th class="text-center px-5 py-3 font-medium">Jml Invoice</th>
            <th class="text-right px-5 py-3 font-medium">Total Transaksi</th>
            <th class="text-right px-5 py-3 font-medium">Total PPN</th>
          </tr></thead>
          <tbody>${rekapData.map(r => `<tr class="table-row border-b border-surface-50">
            <td class="px-5 py-3 font-medium text-surface-800">${r.month}</td>
            <td class="px-5 py-3 text-center"><span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full text-xs font-medium">${r.sph}</span></td>
            <td class="px-5 py-3 text-center"><span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full text-xs font-medium">${r.inv}</span></td>
            <td class="px-5 py-3 text-right font-medium">${formatCurrency(r.total)}</td>
            <td class="px-5 py-3 text-right text-surface-500">${formatCurrency(r.ppn)}</td>
          </tr>`).join('')}

            <td class="px-5 py-3">Total</td>

            <td class="px-5 py-3 text-right text-amber-600">${formatCurrency(grandPPN)}</td>
          </tr></tbody>
        </table>
      </div>
    </div>
  </div>`;

function changeRekapYear() {
  const year = document.getElementById('rekapYearSelect').value;
  localStorage.setItem('rekapSelectedYear', year);
  renderPage();
}

function exportRekapCSV() {
  const selectedYear = parseInt(localStorage.getItem('rekapSelectedYear')) || new Date().getFullYear();
  const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const docs = getDocuments();
  let csv = `Rekap Bulanan ${selectedYear}\nBulan,Jumlah SPH,Jumlah Invoice,Total Transaksi,Total PPN\n`;
  months.forEach((m,i) => {
    const mDocs = docs.filter(d => { const dt = new Date(d.doc_date||d.created_at); return dt.getFullYear()===selectedYear && dt.getMonth()===i; });
    csv += `${m},${mDocs.filter(d=>d.data_category==='sph').length},${mDocs.filter(d=>d.data_category==='invoice').length},${mDocs.reduce((s,d)=>s+(d.grand_total||0),0)},${mDocs.reduce((s,d)=>s+(d.ppn||0),0)}\n`;
  });
  downloadFile(csv, `Rekap_Bulanan_${selectedYear}.csv`, 'text/csv');
}

function printRekap() {
  const selectedYear = parseInt(localStorage.getItem('rekapSelectedYear')) || new Date().getFullYear();
  const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const docs = getDocuments();
  
  const rekapData = months.map((m,i) => {
    const mDocs = docs.filter(d => { const dt = new Date(d.doc_date||d.created_at); return dt.getFullYear()===selectedYear && dt.getMonth()===i; });
    return { month:m, sph:mDocs.filter(d=>d.data_category==='sph').length, inv:mDocs.filter(d=>d.data_category==='invoice').length, total:mDocs.reduce((s,d)=>s+(d.grand_total||0),0), ppn:mDocs.reduce((s,d)=>s+(d.ppn||0),0) };
  });
  
  let html = `<h2 style="text-align:center;margin-bottom:20px;font-size:18pt;font-weight:700">Rekap Bulanan Tahun ${selectedYear}</h2>
    <table style="width:100%;border-collapse:collapse;font-size:10pt">
      <thead><tr style="background:#f1f5f9">
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:left">Bulan</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:center">Jml SPH</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:center">Jml Invoice</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:right">Total Transaksi</th>
        <th style="border:1px solid #cbd5e1;padding:8px;text-align:right">Total PPN</th>
      </tr></thead>
      <tbody>`;
  
  let totalSPH = 0, totalInv = 0, totalTrx = 0, totalPPN = 0;
  rekapData.forEach(r => {
    totalSPH += r.sph;
    totalInv += r.inv;
    totalTrx += r.total;
    totalPPN += r.ppn;
    html += `<tr>
      <td style="border:1px solid #cbd5e1;padding:8px">${r.month}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:center">${r.sph}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:center">${r.inv}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(r.total)}</td>
      <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(r.ppn)}</td>
    </tr>`;
  });
  
  html += `<tr style="background:#f1f5f9;font-weight:700">
    <td style="border:1px solid #cbd5e1;padding:8px">TOTAL</td>
    <td style="border:1px solid #cbd5e1;padding:8px;text-align:center">${totalSPH}</td>
    <td style="border:1px solid #cbd5e1;padding:8px;text-align:center">${totalInv}</td>
    <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(totalTrx)}</td>
    <td style="border:1px solid #cbd5e1;padding:8px;text-align:right">${formatCurrency(totalPPN)}</td>
  </tr></tbody>
    </table>
    <div style="margin-top:20px;font-size:9pt;color:#64748b">
      <p>Dicetak: ${formatDate(new Date().toISOString())}</p>
      <p>Perusahaan: ${companySettings.company_name}</p>
    </div>`;
  
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Rekap_Bulanan_${selectedYear}</title>
    <style>@page{size:A4;margin:15mm}body{margin:0;font-family:'Plus Jakarta Sans',Helvetica,Arial,sans-serif;padding:20px}</style>
  </head><body>${html}</body></html>`);
  w.document.close();
  setTimeout(() => { w.print(); }, 500);
}

  btn.disabled = true;
  btn.textContent = 'Menyimpan...';

  companySettings.company_name = document.getElementById('s_company').value;

  companySettings.show_logo_watermark = document.getElementById('s_show_logo_watermark')?.checked || false;
  companySettings.secondary_signature_name = document.getElementById('s_secondary_name').value;
  companySettings.secondary_signature_title = document.getElementById('s_secondary_title').value;
  companySettings.ppn_enabled = document.getElementById('s_ppn_enabled')?.checked || false;
  companySettings.ppn_rate = parseFloat(document.getElementById('s_ppn_rate')?.value || 0) || 0;
  companySettings.discount_enabled = document.getElementById('s_discount_enabled')?.checked || false;
  companySettings.shipping_enabled = document.getElementById('s_shipping_enabled')?.checked || false;
  companySettings.pph_enabled = document.getElementById('s_pph_enabled')?.checked || false;
  companySettings.pph_rate = parseFloat(document.getElementById('s_pph_rate')?.value || 0) || 0;

  const existingSettings = getSettings();
  const keysToSave = Object.keys(companySettings);

  for (const key of keysToSave) {
    const value = companySettings[key];
    const existing = existingSettings.find(s => s.setting_key === key);

    if (existing) {
      await window.dataSdk.update({...existing, setting_value: String(value)});
    } else {
      if (currentRecordCount >= 999) break;
      await window.dataSdk.create({
        data_category:'setting', setting_key: key, setting_value: String(value),
        type:'', doc_number:'', doc_date:'', customer_name:'', customer_company:'',
        customer_address:'', customer_city:'', customer_phone:'', customer_email:'',
        items_json:'', subtotal:0, ppn:0, grand_total:0, terbilang:'', notes:'',
        status:'', source_doc:'', created_at: new Date().toISOString(),
        company_name:'', company_address:'', company_city:'', company_phone:'', company_email:'',
        product_code:'', product_name:'', product_uom:'', product_price:0, product_desc:'',
        setting_key: key, setting_value: String(value), logo_data:'', signature_data:''
      });
    }
  }
  btn.disabled = false;
  btn.textContent = 'Simpan Pengaturan';
  showToast('Pengaturan berhasil disimpan!');
}

 <script>
(function(){
  const STORAGE_KEY = 'sph_invoice_db_v2';
  const DB_VERSION = 2;
  let appDb = null;

  const SETTING_TYPES = {
    company_name:'string', company_description:'string', company_address:'string', company_city:'string', company_phone:'string', company_email:'string',
    doc_accent:'string', sph_notes:'string', invoice_notes:'string', sph_terms:'string', invoice_terms:'string',
    director_name:'string', director_title:'string', sph_format:'string', inv_format:'string', logo_data:'string', signature_data:'string',
    show_secondary_signature:'boolean', secondary_signature_label:'string', secondary_signature_name:'string', secondary_signature_title:'string', secondary_signature_data:'string', show_logo_watermark:'boolean',
    ppn_rate:'number', ppn_enabled:'boolean', discount_enabled:'boolean', shipping_enabled:'boolean', pph_enabled:'boolean', pph_rate:'number',
    api_web_app_url:'string', api_auto_sync:'boolean', api_last_sync:'string'
  };

  function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
  function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
  function toNumber(val, fallback=0){
    if (typeof val === 'number' && Number.isFinite(val)) return val;
    if (typeof val === 'string') {
      const normalized = val.replace(/[^0-9,.-]/g, '').replace(/\.(?=\d{3}(\D|$))/g, '').replace(',', '.');
      const num = parseFloat(normalized);
      return Number.isFinite(num) ? num : fallback;
    }
    return fallback;
  }
  function toBool(val){
    if (typeof val === 'boolean') return val;
    if (typeof val === 'number') return val !== 0;
    if (typeof val === 'string') return ['true','1','yes','y','on'].includes(val.trim().toLowerCase());
    return false;
  }
  function safeDate(val){
    if (!val) return new Date().toISOString().split('T')[0];
    const d = new Date(val);
    return Number.isNaN(d.getTime()) ? new Date().toISOString().split('T')[0] : d.toISOString().split('T')[0];
  }
  function parseJson(val, fallback){
    try { return JSON.parse(val); } catch (_) { return fallback; }
  }
  function escapeCsv(value){
    const s = String(value ?? '');
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }
  function parseCsv(text){
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      const next = text[i+1];
      if (ch === '"') {
        if (inQuotes && next === '"') {
          field += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === ',' && !inQuotes) {
        row.push(field.trim());
        field = '';
      } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
        if (ch === '\r' && next === '\n') i++;
        row.push(field.trim());
        if (row.some(cell => cell !== '')) rows.push(row.map(cell => cell.replace(/^"|"$/g,'')));
        row = [];
        field = '';
      } else {
        field += ch;
      }
    }
    if (field.length || row.length) {
      row.push(field.trim());
      if (row.some(cell => cell !== '')) rows.push(row.map(cell => cell.replace(/^"|"$/g,'')));
    }
    return rows;
  }

  function normalizeSettings(raw){
    const base = clone(companySettings || {});
    Object.keys(SETTING_TYPES).forEach(key => {
      const type = SETTING_TYPES[key];
      const value = raw && Object.prototype.hasOwnProperty.call(raw, key) ? raw[key] : base[key];
      if (type === 'boolean') base[key] = toBool(value);
      else if (type === 'number') base[key] = toNumber(value, toNumber(base[key], 0));
      else base[key] = value == null ? '' : String(value);
    });
    const legacySph = 'SPH-{NUM}/SSG/{YY}';
    const legacyInv = 'INV-{NUM}/SSG/{YY}';
    if (!base.sph_format || base.sph_format === legacySph) base.sph_format = 'SPH-{NUM}/{ABBR}/{MM}/{YY}';
    if (!base.inv_format || base.inv_format === legacyInv) base.inv_format = 'INV-{NUM}/{ABBR}/{MM}/{YY}';
    if (!String(base.sph_format).includes('{ABBR}')) base.sph_format = String(base.sph_format).replaceAll('SSG', '{ABBR}');
    if (!String(base.inv_format).includes('{ABBR}')) base.inv_format = String(base.inv_format).replaceAll('SSG', '{ABBR}');
    return base;
  }

  function defaultDb(){
    return {
      version: DB_VERSION,
      updated_at: new Date().toISOString(),
      settings: normalizeSettings(companySettings),
      sheets: {
        customers: [],
        products: [],
        doc_headers: [],
        doc_items: [],
        doc_sequences: []
      }
    };
  }

  let onlineLoadStarted = false;
  let onlineSyncInFlight = false;
  let onlineSyncQueued = false;
  let onlineSyncTimer = null;
  const EMBEDDED_WEB_APP_URL = ''; // isi URL /exec di sini sebelum upload ke GitHub Pages jika ingin auto-load lintas device

  function getStartupUrlOverride(){
    try {
      const params = new URLSearchParams(window.location.search || '');
      return String(params.get('api') || params.get('webapp') || '').trim();
    } catch (_) {
      return '';
    }
  }

  function normalizeDbObject(parsed){
    if (!parsed || typeof parsed !== 'object') return null;
    const db = defaultDb();
    db.version = parsed.version || DB_VERSION;
    db.updated_at = parsed.updated_at || new Date().toISOString();
    db.settings = normalizeSettings(parsed.settings || {});
    if (parsed.sheets && typeof parsed.sheets === 'object') {
      db.sheets.customers = Array.isArray(parsed.sheets.customers) ? parsed.sheets.customers : [];
      db.sheets.products = Array.isArray(parsed.sheets.products) ? parsed.sheets.products : [];
      db.sheets.doc_headers = Array.isArray(parsed.sheets.doc_headers) ? parsed.sheets.doc_headers : [];
      db.sheets.doc_items = Array.isArray(parsed.sheets.doc_items) ? parsed.sheets.doc_items : [];
      db.sheets.doc_sequences = Array.isArray(parsed.sheets.doc_sequences) ? parsed.sheets.doc_sequences : [];
    }
    return db;
  }

  function hasMeaningfulData(db){
    if (!db || !db.sheets) return false;
    return !!(
      (db.sheets.customers && db.sheets.customers.length) ||
      (db.sheets.products && db.sheets.products.length) ||
      (db.sheets.doc_headers && db.sheets.doc_headers.length) ||
      (db.sheets.doc_items && db.sheets.doc_items.length) ||
      (db.sheets.doc_sequences && db.sheets.doc_sequences.length)
    );
  }

  function getRemoteConfig(){
    const fallbackUrl = localStorage.getItem('sph_invoice_online_url') || '';
    const fallbackAuto = localStorage.getItem('sph_invoice_online_auto_sync');
    const startupUrl = getStartupUrlOverride() || EMBEDDED_WEB_APP_URL;
    const url = String((appDb && appDb.settings && appDb.settings.api_web_app_url) || companySettings.api_web_app_url || fallbackUrl || startupUrl || '').trim();
    const autoSync = toBool(appDb && appDb.settings ? appDb.settings.api_auto_sync : (companySettings.api_auto_sync || fallbackAuto));
    return { url, autoSync };
  }

  function persistRemoteConfig(url, autoSync){
    if (typeof url !== 'undefined') localStorage.setItem('sph_invoice_online_url', String(url || '').trim());
    if (typeof autoSync !== 'undefined') localStorage.setItem('sph_invoice_online_auto_sync', autoSync ? '1' : '0');
  }

  const COMPARABLE_SHEET_KEYS = {
    customers: ['id','name','company','address','city','phone','email','created_at','updated_at','is_active'],
    products: ['id','code','name','uom','price','description','created_at','updated_at','is_active'],
    doc_headers: ['id','doc_type','doc_number','doc_date','customer_id','customer_name','customer_company','customer_address','customer_city','customer_phone','customer_email','subtotal','discount_amount','shipping_amount','taxable_base','ppn_enabled','ppn_rate','ppn_amount','pph_enabled','pph_rate','pph_amount','grand_total','notes','terms','terbilang','status','source_doc_id','created_at','updated_at'],
    doc_items: ['id','doc_id','seq_no','product_id','item_name','description','qty','uom','unit_price','line_total'],
    doc_sequences: ['id','doc_type','year','last_number','updated_at']
  };

  function canonicalizeRow(row, keys){
    const source = row && typeof row === 'object' ? row : {};
    const result = {};
    keys.forEach(key => {
      const value = source[key];
      if (typeof value === 'boolean') result[key] = value;
      else if (typeof value === 'number') result[key] = Number.isFinite(value) ? value : 0;
      else result[key] = value == null ? '' : String(value);
    });
    return result;
  }

  function normalizeComparableSheets(db){
    const sourceSheets = db && db.sheets && typeof db.sheets === 'object' ? db.sheets : {};
    const sheets = {};
    Object.keys(COMPARABLE_SHEET_KEYS).forEach(sheetName => {
      const keys = COMPARABLE_SHEET_KEYS[sheetName];
      const rows = Array.isArray(sourceSheets[sheetName]) ? sourceSheets[sheetName] : [];
      sheets[sheetName] = rows.map(row => canonicalizeRow(row, keys));
    });
    return sheets;
  }

  function getComparableDbSnapshot(db){
    const normalized = normalizeDbObject(db) || defaultDb();
    return {
      version: normalized.version || DB_VERSION,
      settings: (() => {
        const settings = normalizeSettings(normalized.settings || {});
        delete settings.api_last_sync;
        return settings;
      })(),
      sheets: normalizeComparableSheets(normalized)
    };
  }

  function sameDbSnapshot(a, b){
    return JSON.stringify(getComparableDbSnapshot(a)) === JSON.stringify(getComparableDbSnapshot(b));
  }

  function onlineJsonp(url, params={}){
    return new Promise((resolve, reject) => {
      if (!url) return reject(new Error('URL Web App belum diisi'));
      const callbackName = 'onlineJsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
      const script = document.createElement('script');
      let finished = false;
      const cleanup = () => {
        if (script.parentNode) script.parentNode.removeChild(script);
        try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
      };
      const done = (fn, payload) => {
        if (finished) return;
        finished = true;
        cleanup();
        fn(payload);
      };
      window[callbackName] = (payload) => done(resolve, payload);
      script.onerror = () => done(reject, new Error('Gagal memuat respon dari Google Apps Script'));
      const qs = new URLSearchParams({ ...params, callback: callbackName, _ts: String(Date.now()) });
      script.src = url + (url.includes('?') ? '&' : '?') + qs.toString();
      document.body.appendChild(script);
      setTimeout(() => done(reject, new Error('Timeout saat menghubungi Google Apps Script')), 15000);
    });
  }

  function onlinePostViaForm(url, fields={}){
    return new Promise(async (resolve, reject) => {
      if (!url) return reject(new Error('URL Web App belum diisi'));
      try {
        const body = new URLSearchParams();
        Object.entries(fields).forEach(([key, value]) => {
          body.append(key, typeof value === 'string' ? value : JSON.stringify(value));
        });
        await fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: body.toString()
        });
        resolve({ ok: true });
      } catch (err) {
        reject(err instanceof Error ? err : new Error('Gagal mengirim data ke Google Apps Script'));
      }
    });
  }

  function applyDbSnapshot(snapshot, renderAfter=true){
    const normalized = normalizeDbObject(snapshot);
    if (!normalized) return false;
    appDb = normalized;
    syncCompanySettings();
    rebuildLegacyView();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appDb));
    persistRemoteConfig(appDb.settings.api_web_app_url, appDb.settings.api_auto_sync);
    if (renderAfter) renderPage();
    return true;
  }

  async function fetchRemoteDb(){
    const { url, autoSync } = getRemoteConfig();
    persistRemoteConfig(url, autoSync);
    const result = await onlineJsonp(url, { action: 'getDb' });
    if (!result || result.ok === false) throw new Error((result && result.message) || 'Tidak ada respon database');
    return normalizeDbObject(result.db || result.data || result);
  }

  async function pushDbToRemote(force=false, showSuccess=false){
    const { url, autoSync } = getRemoteConfig();
    persistRemoteConfig(url, autoSync);
    if (!url) {
      if (force) throw new Error('URL Web App belum diisi');
      return false;
    }
    if (!force && !autoSync) return false;
    if (!appDb) return false;
    if (onlineSyncInFlight) {
      onlineSyncQueued = true;
      return true;
    }
    onlineSyncInFlight = true;
    try {
      appDb.updated_at = new Date().toISOString();
      await onlinePostViaForm(url, { action: 'saveDb', payload: JSON.stringify(appDb) });
      appDb.settings.api_last_sync = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appDb));
      syncCompanySettings();
      if (currentPage === 'settings') renderPage();
      if (showSuccess) showToast('Sinkronisasi dikirim ke Google Sheets');
      return true;
    } catch (err) {
      throw err instanceof Error ? err : new Error('Gagal mengirim data ke Google Sheets');
    } finally {
      onlineSyncInFlight = false;
      if (onlineSyncQueued) {
        onlineSyncQueued = false;
        setTimeout(() => pushDbToRemote(force, false).catch(err => console.error(err)), 500);
      }
    }
  }

  function scheduleRemoteSync(){
    const { url, autoSync } = getRemoteConfig();
    if (!url || !autoSync) return;
    clearTimeout(onlineSyncTimer);
    onlineSyncTimer = setTimeout(() => {
      pushDbToRemote(false, false).catch(err => {
        console.error(err);
        showToast('Auto sync gagal. Data lokal tetap aman di browser.', 'error');
      });
    }, 1200);
  }

  async function bootstrapRemoteDb(showToastOnLoad=false){
    if (onlineLoadStarted) return false;
    onlineLoadStarted = true;
    try {
      const { url, autoSync } = getRemoteConfig();
      persistRemoteConfig(url, autoSync);
      if (!url) return false;
      if (appDb && appDb.settings && !appDb.settings.api_web_app_url) {
        appDb.settings.api_web_app_url = url;
      }
      const remoteDb = await fetchRemoteDb();
      if (!hasMeaningfulData(remoteDb)) return false;
      const localDb = normalizeDbObject(appDb) || defaultDb();
      const localHasData = hasMeaningfulData(localDb);
      const remoteTime = new Date(remoteDb.updated_at || 0).getTime() || 0;
      const localTime = new Date(localDb.updated_at || 0).getTime() || 0;
      if (!localHasData || remoteTime >= localTime) {
        applyDbSnapshot(remoteDb, true);
        if (showToastOnLoad) showToast('Data Google Sheets berhasil dimuat otomatis');
        return true;
      }
      return false;
    } catch (err) {
      console.error('Startup online load failed:', err);
      return false;
    }
  }

  function extractRunningNumber(docNumber){
    const match = String(docNumber || '').match(/(\d{3,})/);
    return match ? parseInt(match[1], 10) : 0;
  }

  function migrateLegacyFlatData(records){
    const db = defaultDb();
    const customerMap = new Map();
    const productMap = new Map();
    const now = new Date().toISOString();
    const rows = Array.isArray(records) ? records : [];

    rows.forEach(rec => {
      if (!rec || !rec.data_category) return;
      if (rec.data_category === 'setting' && rec.setting_key) {
        db.settings[rec.setting_key] = rec.setting_value;
      }
    });
    db.settings = normalizeSettings(db.settings);

    rows.forEach(rec => {
      if (!rec || !rec.data_category) return;
      if (rec.data_category === 'customer') {
        const id = rec.__backendId || rec.id || uid('cust');
        const entity = {
          id,
          name: rec.customer_name || '', company: rec.customer_company || '', address: rec.customer_address || '', city: rec.customer_city || '',
          phone: rec.customer_phone || '', email: rec.customer_email || '', created_at: rec.created_at || now, updated_at: now, is_active: rec.status !== 'deleted'
        };
        db.sheets.customers.push(entity);
        const key = [entity.name, entity.company, entity.phone, entity.email].join('|').toLowerCase();
        if (key.replace(/\|/g,'')) customerMap.set(key, id);
      } else if (rec.data_category === 'product') {
        const id = rec.__backendId || rec.id || uid('prod');
        const entity = {
          id,
          code: rec.product_code || '', name: rec.product_name || '', uom: rec.product_uom || '', price: toNumber(rec.product_price),
          description: rec.product_desc || '', created_at: rec.created_at || now, updated_at: now, is_active: rec.status !== 'deleted'
        };
        db.sheets.products.push(entity);
        const key = [entity.code, entity.name].join('|').toLowerCase();
        if (key.replace(/\|/g,'')) productMap.set(key, id);
      }
    });

    rows.forEach(rec => {
      if (!rec || !['sph','invoice'].includes(rec.data_category)) return;
      const headerId = rec.__backendId || rec.id || uid('doc');
      const customerKey = [rec.customer_name || '', rec.customer_company || '', rec.customer_phone || '', rec.customer_email || ''].join('|').toLowerCase();
      let customerId = customerMap.get(customerKey) || '';
      if (!customerId && (rec.customer_name || rec.customer_company)) {
        customerId = uid('cust');
        db.sheets.customers.push({
          id: customerId,
          name: rec.customer_name || '', company: rec.customer_company || '', address: rec.customer_address || '', city: rec.customer_city || '',
          phone: rec.customer_phone || '', email: rec.customer_email || '', created_at: rec.created_at || now, updated_at: now, is_active: true
        });
        customerMap.set(customerKey, customerId);
      }
      const header = {
        id: headerId,
        doc_type: rec.data_category,
        doc_number: rec.doc_number || '',
        doc_date: safeDate(rec.doc_date || rec.created_at),
        customer_id: customerId,
        customer_name: rec.customer_name || '', customer_company: rec.customer_company || '', customer_address: rec.customer_address || '', customer_city: rec.customer_city || '', customer_phone: rec.customer_phone || '', customer_email: rec.customer_email || '',
        subtotal: Math.round(toNumber(rec.subtotal)),
        discount_amount: Math.round(toNumber(rec.discount)),
        shipping_amount: Math.round(toNumber(rec.shipping_cost)),
        taxable_base: Math.round(toNumber(rec.subtotal) - toNumber(rec.discount) + toNumber(rec.shipping_cost)),
        ppn_enabled: rec.ppn_active === undefined ? !!db.settings.ppn_enabled : toBool(rec.ppn_active),
        ppn_rate: toNumber(rec.ppn_rate, db.settings.ppn_rate),
        ppn_amount: Math.round(toNumber(rec.ppn)),
        pph_enabled: toNumber(rec.tax_pph) > 0,
        pph_rate: toNumber(rec.pph_rate, db.settings.pph_rate),
        pph_amount: Math.round(toNumber(rec.tax_pph)),
        grand_total: Math.round(toNumber(rec.grand_total)),
        notes: rec.notes || '',
        terms: rec.data_category === 'sph' ? db.settings.sph_terms : db.settings.invoice_terms,
        terbilang: rec.terbilang || '',
        status: rec.status || 'active',
        source_doc_id: rec.source_doc || '',
        created_at: rec.created_at || now,
        updated_at: now
      };
      db.sheets.doc_headers.push(header);
      const items = parseJson(rec.items_json || '[]', []);
      items.forEach((item, idx) => {
        const prodKey = [item.code || '', item.name || ''].join('|').toLowerCase();
        const productId = productMap.get(prodKey) || '';
        db.sheets.doc_items.push({
          id: uid('item'),
          doc_id: headerId,
          seq_no: idx + 1,
          product_id: productId,
          item_name: item.name || '',
          description: item.description || '',
          qty: toNumber(item.qty, 0),
          uom: item.uom || '',
          unit_price: Math.round(toNumber(item.price)),
          line_total: Math.round(toNumber(item.qty,0) * toNumber(item.price,0))
        });
      });
      const year = new Date(header.doc_date).getFullYear();
      const running = extractRunningNumber(header.doc_number);
      let seq = db.sheets.doc_sequences.find(x => x.doc_type === header.doc_type && x.year === year);
      if (!seq) {
        seq = { id: uid('seq'), doc_type: header.doc_type, year, last_number: 0, updated_at: now };
        db.sheets.doc_sequences.push(seq);
      }
      seq.last_number = Math.max(seq.last_number, running);
      seq.updated_at = now;
    });

    db.settings = normalizeSettings(db.settings);
    db.updated_at = now;
    return db;
  }

  function rebuildLegacyView(){
    const settingsRows = Object.keys(appDb.settings).map(key => ({ __backendId: 'setting_' + key, data_category: 'setting', setting_key: key, setting_value: appDb.settings[key], created_at: appDb.updated_at }));
